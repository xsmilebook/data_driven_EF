  ColorStroop:
    family: conflict
    acc_threshold: 0.25
  EmotionStroop:
    family: conflict
    acc_threshold: 0.25
  CPT:
    family: gonogo
    acc_threshold: 0.5
  EmotionSwitch:
    family: switch
    acc_threshold: 0.25
    mixed_from: 65
  Number1Back:
    family: nback
    acc_threshold: 0.5
    n_back: 1
  Number2Back:
    family: nback
    acc_threshold: 0.5
    n_back: 2
  Spatial1Back:
    family: nback
    acc_threshold: 0.5
    n_back: 1
  Spatial2Back:
    family: nback
    acc_threshold: 0.5
    n_back: 2
  Emotion1Back:
    family: nback
    acc_threshold: 0.5
    n_back: 1
  Emotion2Back:
    family: nback
    acc_threshold: 0.5
    n_back: 2
  KT:
    family: kt
    acc_threshold:
  ZYST:
    family: zyst
    acc_threshold:
  DCCS:
    family: switch
    acc_threshold: 0.5
    mixed_from: 21
  GNG:
